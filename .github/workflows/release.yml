name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run cargo publish --dry-run instead of publishing"
        type: boolean
        default: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish cliview to crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Assert tag matches Cargo.toml version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/v}"
          crate_version=$(cargo metadata --no-deps --format-version=1 \
            | jq -r '.packages[] | select(.name=="cliview") | .version')
          echo "tag=$tag crate=$crate_version"
          if [ "$tag" != "$crate_version" ]; then
            echo "tag v$tag does not match cliview version $crate_version" >&2
            exit 1
          fi

      - name: cargo test
        run: cargo test --workspace

      - name: cargo publish (dry-run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: cargo publish -p cliview --dry-run

      - name: cargo publish
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish -p cliview
