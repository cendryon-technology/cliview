name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run cargo publish --dry-run instead of publishing"
        type: boolean
        default: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish cliview to crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Sync embedded SPA
        run: |
          rm -rf crates/cliview/frontend/dist
          cp -R frontend/build crates/cliview/frontend/dist

      - name: Assert tag matches Cargo.toml version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/v}"
          crate_version=$(cargo metadata --no-deps --format-version=1 \
            | jq -r '.packages[] | select(.name=="cliview") | .version')
          echo "tag=$tag crate=$crate_version"
          if [ "$tag" != "$crate_version" ]; then
            echo "tag v$tag does not match cliview version $crate_version" >&2
            exit 1
          fi

      - name: cargo test
        run: cargo test --workspace

      - name: cargo publish (dry-run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: cargo publish -p cliview --dry-run

      - name: cargo publish
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish -p cliview
